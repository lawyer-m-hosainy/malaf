name: مَلَف CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# إلغاء runs قديمة عند push جديد لنفس الـ branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────
  # Job 1: quality-gate
  # يعمل على: كل push و PR
  # ────────────────────────────────────
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --reporter=verbose --coverage
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder_anon_key
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Check bundle size
        run: |
          BUILD_SIZE=$(du -sk dist/ | cut -f1)
          echo "Bundle size: ${BUILD_SIZE}KB"
          if [ "$BUILD_SIZE" -gt 5120 ]; then
            echo "❌ Bundle too large: ${BUILD_SIZE}KB (limit: 5MB)"
            exit 1
          fi
          echo "✅ Bundle size OK: ${BUILD_SIZE}KB"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: malaf-build-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ────────────────────────────────────
  # Job 2: security-scan
  # يعمل على: كل push و PR
  # ────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality-gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: |
          npm audit --audit-level=high --json > audit-report.json || true
          CRITICAL=$(cat audit-report.json | node -e "
            const d = require('fs').readFileSync('/dev/stdin','utf8');
            const r = JSON.parse(d);
            const vulns = r.metadata?.vulnerabilities || {};
            console.log((vulns.critical || 0) + (vulns.high || 0));
          ")
          echo "High/Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Found $CRITICAL high/critical vulnerabilities"
            npm audit --audit-level=high
            exit 1
          fi
          echo "✅ No high/critical vulnerabilities found"

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          
          if grep -rn "sk-[a-zA-Z0-9]{48}" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Possible OpenAI key found in source"
            FOUND=1
          fi
          
          if grep -rn "SUPABASE_SERVICE_ROLE_KEY\s*=" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Service role key reference in frontend source"
            FOUND=1
          fi
          
          if grep -rn "VITE_ENCRYPTION_KEY\|VITE_SERVICE_ROLE" src/ --include="*.ts" --include="*.tsx" 2>/dev/null; then
            echo "❌ Secret exposed via VITE_ prefix (accessible in browser)"
            FOUND=1
          fi
          
          if [ "$FOUND" -gt 0 ]; then exit 1; fi
          echo "✅ No hardcoded secrets detected"

  # ────────────────────────────────────
  # Job 3: deploy-production
  # يعمل على: main branch فقط
  # ────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-gate, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: https://malaf.onrender.com

    steps:
      - name: Trigger Render Deploy
        run: |
          echo "🚀 Triggering Render.com deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "❌ Render deploy hook failed with status: $RESPONSE"
            exit 1
          fi
          echo "✅ Deploy triggered successfully (HTTP $RESPONSE)"

      - name: Wait for deployment
        run: |
          echo "⏳ Waiting 90 seconds for deployment to complete..."
          sleep 90

      - name: Health check
        run: |
          echo "🏥 Running health check..."
          MAX_ATTEMPTS=10
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS..."
            
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              https://malaf.onrender.com/api/health)
            
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed! (HTTP 200)"
              
              HEALTH=$(curl -s https://malaf.onrender.com/api/health)
              echo "Health response: $HEALTH"
              exit 0
            fi
            
            echo "⚠️ Got HTTP $STATUS, retrying in 15s..."
            sleep 15
          done
          
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Create deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://malaf.onrender.com |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────
  # Job 4: notify-on-failure
  # يعمل فقط إذا فشل أي job سابق
  # ────────────────────────────────────
  notify-on-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [quality-gate, security-scan, deploy-production]
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Pipeline Failed — ${context.sha.substring(0,7)}`,
              body: [
                '## تفاصيل الفشل',
                '',
                `| | |`,
                `|---|---|`,
                `| **Commit** | \`${context.sha}\` |`,
                `| **Branch** | \`${context.ref}\` |`,
                `| **Triggered by** | @${context.actor} |`,
                `| **Run URL** | ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId} |`,
                '',
                '## الخطوة التالية',
                '1. افتح رابط الـ Run أعلاه',
                '2. حدد الـ Job الفاشل',
                '3. افحص الـ logs',
                '4. أصلح المشكلة وادفع commit جديد',
              ].join('\n'),
              labels: ['bug', 'deployment', 'automated'],
            });
            console.log(`Created issue #${issue.number}: ${issue.html_url}`);
