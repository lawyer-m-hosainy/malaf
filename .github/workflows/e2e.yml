name: Playwright E2E Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npx playwright test --config=malaf-e2e/playwright.config.ts
      env:
        VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
        VITE_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
        # We don't expose SERVICE_ROLE_KEY to the frontend, only to setup scripts if needed
        
    - name: Upload Playwright Failure Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
