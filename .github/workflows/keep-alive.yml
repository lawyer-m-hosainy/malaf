name: Keep Alive — Prevent Render Cold Start

on:
  schedule:
    # Ping every 10 minutes to keep the server awake
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping malaf.pro health endpoint
        run: |
          echo "⏰ Pinging malaf.pro to prevent cold start..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://malaf.pro/api/health/ping --max-time 30)
          echo "📡 Response status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "✅ Server is awake and healthy!"
          else
            echo "⚠️ Server returned $HTTP_STATUS — may be starting up"
          fi
