services:
  - type: web
    name: malaf-egypt-production
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:all
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: NODE_ENV
        value: production
      - key: PRODUCTION_URL
        value: https://malaf-egypt-production.onrender.com
