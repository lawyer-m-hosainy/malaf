services:
  - type: web
    name: malaf-platform
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        value: https://zidejnagdyoimyhprxrt.supabase.co
      - key: VITE_SUPABASE_URL
        value: https://zidejnagdyoimyhprxrt.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ENCRYPTION_KEY_PREVIOUS
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: PAYMOB_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_VERIFY_TOKEN
        value: malaf_messenger_verify
      - key: FB_APP_SECRET
        sync: false
      - key: PRODUCTION_URL
        value: https://malaf.pro
    headers:
      # 1. Static Assets (Vite)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      
      # 2. HTML Pages
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      
      # 3. API Routes
      - path: /api/*
        name: Cache-Control
        value: no-store, max-age=0

      # 4. Security Headers
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://accounts.google.com https://*.googleapis.com https://*.daily.co; frame-src 'self' https://accounts.google.com https://*.supabase.co; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
