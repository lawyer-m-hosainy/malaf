services:
  - type: web
    name: malaf-platform
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run build:all
    startCommand: node server.js
    healthCheckPath: /api/health/ping
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        value: https://zidejnagdyoimyhprxrt.supabase.co
      - key: VITE_SUPABASE_URL
        value: https://zidejnagdyoimyhprxrt.supabase.co
      # ✅ R2-FIX: ANON_KEY moved to sync: false — يجب إدخاله يدوياً في Render Dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # ✅ R2-FIX: JWT secret for token verification (get from Supabase → Settings → API → JWT Secret)
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      # R6-FIX: For key rotation — set old key here when rotating ENCRYPTION_KEY
      - key: ENCRYPTION_KEY_PREVIOUS
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: WA_VERIFY_TOKEN
        sync: false
      - key: PRODUCTION_URL
        value: https://malaf-platform.onrender.com
      # ✅ R2-FIX: VITE_ENABLE_DEMO removed from production — كانت تفتح كل الـ API بدون مصادقة
